name: Notify Discord
on:
  push:
    branches: '*'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      
      # Step generated by Claude
      - name: Build commit list
        id: commits
        run: |
          COMMIT_LIST=$(echo '${{ toJson(github.event.commits) }}' | \
            jq -r '[.[] | "`\(.id[:7])` - \(.author.name): \(.message | split("\n")[0])"] | join("\\n")')
          echo -e "list=$COMMIT_LIST" >> $GITHUB_OUTPUT

      - name: Post to Discord
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            **${{ github.actor }}** pushed to **${{ github.repository }}**
            Branch: `${{ github.ref_name }}`
            Commits:
            ${{ steps.commits.outputs.list }}
            Compare: <${{ github.event.compare }}>
